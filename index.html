<style>

/* ENVELOPE */
#envelope{
  width:220px;
  height:140px;
  margin:30px auto;
  position:relative;
  background:#ffb6c1;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  overflow:hidden;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff8fab;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.8s;
}

.heart-seal{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
}

/* DESCHIS */
#envelope.open .flap{
  transform:rotateX(180deg);
}

/* FOAIA */
#letterPaper{
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:20px;

  background:white;
  color:black;

  border-radius:15px;

  opacity:0;
  transform:translateY(-50px);
  transition:0.8s;

  font-family:'Dancing Script', cursive;
  font-size:22px;
}

#letterPaper.show{
  opacity:1;
  transform:translateY(0);
}

.love-fill{

/* INIMI */

.heart{
  position:fixed;
  bottom:-20px;
  left:0;

  color:#ff2d55;
  font-size:24px;

  animation:rise linear forwards;
  will-change: transform, opacity;
  pointer-events:none;

  transform: translate3d(0,0,0);
}
@keyframes rise{
  0%{

.back{

.papyrus::after{

<script>

  let heartsInterval = null;
let firstSelected = null;
let musicInterval = null;
let musicHeartInterval = null;
  let musicNoteInterval = null;
  
    const specialDates = [
  {date:"2024-02-05", text:"💞 Ziua în care ne-am cunoscut"},
  {date:"2003-07-12", text:"🎂 Ziua ta de naștere"},
  {date:"2004-03-18", text:"🎂 Ziua mea de naștere"},
  {date:"2024-06-10", text:"💋 Primul sărut"},
  {date:"2024-08-20", text:"🌍 Prima vacanță împreună"}
];
/* NAVIGARE */
function showSection(id){

  if(id==="letter"){
  resetLetter();
}
 
  stopHearts();
  stopMusic();
  window.scrollTo(0, 0);

  document.getElementById("menu").style.display="none";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  const section=document.getElementById(id);
  if(section){
    section.classList.add("active");
  }

  // 🔥 AICI CONTROLĂM HEADER-UL
  if(id === "daily"){
    toggleHeader(true);   // apare la Mesajul zilei
  } else {
    toggleHeader(false);  // dispare peste tot altundeva
  }

  if(id==="calendar") loadCalendar();
  if(id==="quiz") loadQuiz();
  if(id==="daily") showDailyMessage();
  if(id==="balloons") createBalloons();
  if(id==="music") startMusicSection();
  if(id==="puzzle"){
    loadPuzzle();
    loadPuzzleSelector();
  }
}

function goBack(){

  if(musicNoteInterval){
  clearInterval(musicNoteInterval);
  musicNoteInterval = null;
}
  
  document.getElementById("menu").style.display="block";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  toggleHeader(true);
startHearts();
  const music = document.getElementById("bgMusic");
  if(music){
    music.pause();
    music.currentTime = 0;
  }

  if(musicInterval){
    clearInterval(musicInterval);
    musicInterval = null;
  }

  if(typeof musicHeartInterval !== "undefined" && musicHeartInterval){
    clearInterval(musicHeartInterval);
    musicHeartInterval = null;
  }

}
window.addEventListener("load", () => {
  toggleHeader(true);   // apare pe Home
  startHearts();
});
function showPopup(emoji){

const popup=document.getElementById("popup");
popup.innerText=emoji;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},4000);

}

/* TIMER */
const startDate=new Date("2024-02-04T19:30:25");

setInterval(()=>{
const now=new Date();
let diff=now-startDate;

let sec=Math.floor(diff/1000)%60;
let min=Math.floor(diff/60000)%60;
let hrs=Math.floor(diff/3600000)%24;
let days=Math.floor(diff/86400000);

let years=Math.floor(days/365);
days%=365;
let months=Math.floor(days/30);
days%=30;

document.getElementById("timer").innerHTML=
years+" ani<br>"+
months+" luni<br>"+
days+" zile<br>"+
hrs+" ore<br>"+
min+" minute<br>"+
sec+" secunde";
},1000);

/* INIMI */
function createHeart(){

  const isHome = document.getElementById("menu").style.display !== "none";

  b.style.background=`hsl(${Math.random()*360},80%,60%)`;

let angle = Math.random() * Math.PI * 2;
let radius = 50 + Math.random() * 40; // cât de mare e cercul
const rect = container.getBoundingClientRect();

let centerX = Math.random() * rect.width;
let centerY = Math.random() * rect.height;

function move(){
  angle += 0.015; // viteza rotației (mai mic = mai lent)

let x = centerX + Math.cos(angle) * radius;
let y = centerY + Math.sin(angle) * radius;
x = Math.max(0, Math.min(x, rect.width - 50));
y = Math.max(0, Math.min(y, rect.height - 70));
  b.style.left = x + "px";
  b.style.top = y + "px";

  requestAnimationFrame(move);
}

move();

  // 🔥 AICI legăm poza de balon

 let puzzle = [];
let emptyIndex = 8;
let puzzleSolved = false;
  const puzzleImages = [
  "dada.jpeg",
  "roma14.jpeg",
  "roma17.jpeg",
  "roma11.jpeg",
  "roma12.jpeg",
  "roma13.jpeg",
  "roma15.jpeg",
  "roma16.jpeg"
];

let currentPuzzleImage = puzzleImages[0];
  
function loadPuzzle(){

  const board = document.getElementById("puzzleBoard");
  board.innerHTML = "";

  const rows = 3;
  const cols = 4;
  const totalPieces = rows * cols;

  puzzle = [];

  for(let i = 0; i < totalPieces - 1; i++){
    puzzle.push(i);
  }

  // piesa goală
  puzzle.push(totalPieces - 1);

  puzzle.sort(() => Math.random() - 0.5);

  emptyIndex = puzzle.indexOf(totalPieces - 1);

  puzzleSolved = false;

  drawPuzzle();
}
 function drawPuzzle(){

  const board = document.getElementById("puzzleBoard");
  board.innerHTML = "";

  const rows = 3;
  const cols = 4;

  const boardWidth = board.clientWidth;
  const boardHeight = board.clientHeight;

  const pieceWidth = boardWidth / cols;
  const pieceHeight = boardHeight / rows;

  puzzle.forEach((value,index)=>{

    const piece = document.createElement("div");

    if(value === rows*cols - 1){
      piece.style.background = "transparent";
    } else {

      piece.className = "piece";

      piece.style.backgroundImage = "url('" + currentPuzzleImage + "')";

      piece.style.backgroundSize =
        boardWidth + "px " + boardHeight + "px";

      const row = Math.floor(value / cols);
      const col = value % cols;

      piece.style.backgroundPosition =
        `-${col * pieceWidth}px -${row * pieceHeight}px`;
    }

    piece.onclick = ()=>movePiece(index);

    board.appendChild(piece);

  });

}
function movePiece(index){

  const rows = 3;
  const cols = 4;

  const row = Math.floor(index / cols);
  const col = index % cols;

  const emptyRow = Math.floor(emptyIndex / cols);
  const emptyCol = emptyIndex % cols;

  const distance =
    Math.abs(row - emptyRow) +
    Math.abs(col - emptyCol);

  if(distance === 1 && !puzzleSolved){

    [puzzle[index],puzzle[emptyIndex]] =
    [puzzle[emptyIndex],puzzle[index]];

    emptyIndex = index;

    drawPuzzle();

    // 🔥 AICI pui codul de verificare
    if(checkPuzzleComplete() && !puzzleSolved){

      puzzleSolved = true;

      setTimeout(()=>{

        showPopup("🎉😘");

        const board = document.getElementById("puzzleBoard");
        board.innerHTML = `
          <div style="
            grid-column: span 3;
            text-align:center;
            font-size:22px;
            font-family:'Dancing Script', cursive;
            color:white;
            margin-top:20px;
          ">
            Felicitări iubire!!!💖
          </div>
        `;

      },300);

    }
  }
}
  function checkPuzzleComplete(){

  for(let i=0;i<puzzle.length;i++){
    if(puzzle[i] !== i){
      return false;
    }
  }

  return true;
}

 function loadCalendar(){

  const container = document.getElementById("calendarList");
  container.innerHTML = "";

  const today = new Date();

  specialDates
    .map(item => {

      const eventDate = new Date(item.date);

      let next = new Date(
        today.getFullYear(),
        eventDate.getMonth(),
        eventDate.getDate()
      );

      if(next < today){
        next.setFullYear(today.getFullYear()+1);
      }

      const diff = Math.ceil((next - today) / 86400000);

      return {...item, diff, next, eventDate};

    })
    .sort((a,b)=>a.diff-b.diff)
    .forEach(item =>{

      const div = document.createElement("div");
      div.className = "calendar-item";

      div.innerHTML = `
        <strong>${item.text}</strong><br>
        📅 ${item.eventDate.toLocaleDateString()}<br>
        ⏳ În ${item.diff} zile
      `;

      container.appendChild(div);

    });

}
