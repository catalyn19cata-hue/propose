.love-container{
  width:50px;

  background:rgba(255,255,255,0.2);
  border-radius:40px;
  border:2px solid white;
  cursor:pointer;
  touch-action: none;

.love-fill{
position:absolute;
bottom:0;
width:100%;
background:#ff2d55;
border-radius:40px;
height:0%;

.love-message{

position:fixed;

left:50%;

.heart{
  position:fixed;
  bottom:-20px;
  color:#ff2d55;
  font-size:22px;
  animation:rise linear forwards;

  will-change: transform, opacity;
  transform: translateZ(0);
}

@keyframes rise{
  0%{
    transform: translate3d(0,0,0);
    opacity:1;
  }
  100%{
    transform: translate3d(0,-110vh,0);
    opacity:0;
  }
}

.back{

width:200px;

.papyrus{
    width:85%;
    max-width:320px;
    margin:20px auto;
    padding:25px 20px;
    display:flex;
    align-items:center;
    justify-content:center;

    /* 🟤 PAPIRUS MAI VECHI + TEXTURĂ */
    background:
        linear-gradient(135deg,#d6b97a,#c29a5f,#a67c3b),
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.15), transparent 40%),

        repeating-linear-gradient(
            0deg,
            rgba(0,0,0,0.03),
            rgba(0,0,0,0.03) 2px,

            transparent 4px

    filter: contrast(1.1) brightness(0.85) sepia(0.4);

   color:#ffffff;

  text-shadow:
    0 0 5px #ff7ad9,

}

    border-radius:25px;

    box-shadow:
        0 25px 50px rgba(0,0,0,0.5),

        inset 0 0 10px rgba(255,255,255,0.2);

    font-family:'Dancing Script', cursive;
    font-size:28px;
    line-height:1.6;
    text-align:center;

    position:relative;
    animation:fadeIn 0.6s ease;
}
  .papyrus::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
    pointer-events:none;
}

/* colțuri decorative */
.papyrus::after{
    content:"💖";
    position:absolute;
    font-size:22px;
    color:rgba(120,80,30,0.4);
    bottom:10px;
    right:15px;
}

.papyrus:before{
top:10px;
left:15px;
}

.papyrus:after{
bottom:10px;
right:15px;
}

.papyrus:before{
top:0;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.papyrus:after{
bottom:0;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
  @keyframes neonGlow{
  from{
    text-shadow:

@keyframes pulse{

<script>

/* NAVIGARE */

function showSection(id){
  

  document.getElementById("menu").style.display="none";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  const section=document.getElementById(id);
  if(section){
    section.classList.add("active");
  }

 if(id==="quiz") loadQuiz();
if(id==="daily") showDailyMessage();
if(id==="balloons") createBalloons();
if(id==="music") startMusicSection();
if(id==="puzzle"){
  loadPuzzle();
  loadPuzzleSelector();
}
  
}

function goBack(){

  document.getElementById("menu").style.display="block";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  const music = document.getElementById("bgMusic");
  if(music){
    music.pause();
    music.currentTime = 0;
      music.src = "";
  music.load();
  }
 if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = null;
  }
  clearInterval(musicInterval);
  heartsInterval = setInterval(createHeart,2500);
}


/* POPUP */
function showPopup(emoji){

const popup=document.getElementById("popup");
popup.innerText=emoji;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},4000);

}

/* TIMER */
const startDate=new Date("2024-02-05T17:25:25");

setInterval(()=>{
const now=new Date();
let diff=now-startDate;

let sec=Math.floor(diff/1000)%60;
let min=Math.floor(diff/60000)%60;
let hrs=Math.floor(diff/3600000)%24;
let days=Math.floor(diff/86400000);

let years=Math.floor(days/365);
days%=365;
let months=Math.floor(days/30);
days%=30;

document.getElementById("timer").innerHTML=
years+" ani<br>"+
months+" luni<br>"+
days+" zile<br>"+
hrs+" ore<br>"+
min+" minute<br>"+
sec+" secunde";
},1000);

/* INIMI */
function createHeart(){

  // 🔥 NU inimile în:
  // - baloane
  // - puzzle

  if(
    document.getElementById("balloons")?.classList.contains("active") ||
    document.getElementById("puzzle")?.classList.contains("active")
  ){
    return;
  }

  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerText="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  document.getElementById("effectsLayer").appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
}
let heartsInterval = setInterval(createHeart,2500);

/* QUIZ */
const questions=[

{q:"Întrebarea 1?",a:["vasile","ion","C"],c:0},
{q:"Întrebarea 2?",a:["A","B","C"],c:1},
{q:"Întrebarea 3?",a:["A","B","C"],c:2},
{q:"Întrebarea 4?",a:["A","B","C"],c:0},
{q:"Întrebarea 5?",a:["A","B","C"],c:1},
{q:"Întrebarea 6?",a:["A","B","C"],c:2},
{q:"Întrebarea 7?",a:["A","B","C"],c:0},
{q:"Întrebarea 8?",a:["A","B","C"],c:1},
{q:"Întrebarea 9?",a:["A","B","C"],c:2},
{q:"Întrebarea 10?",a:["A","B","C"],c:0},
{q:"Întrebarea 11?",a:["A","B","C"],c:1},
{q:"Întrebarea 12?",a:["A","B","C"],c:2},
{q:"Întrebarea 13?",a:["A","B","C"],c:0},
{q:"Întrebarea 14?",a:["A","B","C"],c:1},
{q:"Întrebarea 15?",a:["A","B","C"],c:2}

];
let quizOrder = [];
let quizIndex = 0;
function loadQuiz(){

  const container=document.getElementById("quizContainer");
  container.innerHTML="";

  // dacă nu avem ordine sau am terminat tot
  if(quizOrder.length === 0 || quizIndex >= quizOrder.length){
    quizOrder = [...questions].sort(()=>Math.random()-0.5);
    quizIndex = 0;
  }

  // luăm următoarele 7
  let selected = quizOrder.slice(quizIndex, quizIndex+7);

  selected.forEach(q=>{

    let div=document.createElement("div");
    div.className="quiz-question";
    div.innerHTML="<h3>"+q.q+"</h3>";

    let answersDiv=document.createElement("div");
    answersDiv.className="answers";

    q.a.forEach((ans,i)=>{

      let btn=document.createElement("button");
      btn.innerText=ans;

      btn.onclick=()=>{

        Array.from(answersDiv.querySelectorAll("button"))
          .forEach(b=>b.style.background="");

        btn.style.background="#ffffff55";

        if(i===q.c){
          showPopup("😘");
          btn.style.background="green";
        }else{
          showPopup("😢");
          btn.style.background="red";
        }

      };

      answersDiv.appendChild(btn);

    });

    div.appendChild(answersDiv);
    container.appendChild(div);

  });

  quizIndex += 7;

  // buton următoarele 7
  let nextBtn=document.createElement("button");
  nextBtn.innerText="👉 Următoarele 7";
  nextBtn.style.marginTop="20px";
  nextBtn.onclick=loadQuiz;

  container.appendChild(nextBtn);
}

/* LOVE */
function setLove(e){

const rect=e.currentTarget.getBoundingClientRect();
let percent=100-(e.clientY-rect.top)/rect.height*100;
percent=Math.round(percent/10)*10;

if(percent<0) percent=0;
if(percent>100) percent=100;

document.getElementById("loveFill").style.height=percent+"%";

const message=document.getElementById("loveMessage");

const messages={
0:"😢 Serios?",
10:"🙂 Începem timid!",
20:"😄 Crește!",
30:"😊 Aproape!",
40:"💞 Simt ceva!",
50:"🔥 Jumătate!",
60:"😍 Devine serios!",
70:"💘 Aproape!",
80:"🥰 Foarte aproape!",
90:"💖 WOW!",
100:"😘 MAXIM!"
};

message.innerText=messages[percent]||"";

if(percent===100){
showPopup("😘");
document.getElementById("loveMessage").innerText =
"Atât de mult te iubesc și eu 💖";
}
if(percent===0) showPopup("😢");

}

const dailyMessages = [

];

function getDayOfYear(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  return Math.floor(diff / 86400000);
}

function showDailyMessage(){
  const day = getDayOfYear() % dailyMessages.length;
  document.getElementById("dailyMessage").innerText =
    dailyMessages[day];
}
setInterval(() => {
  showDailyMessage();
}, 60000);

  b.className="balloon";

  b.style.width="80px";
  b.style.height="110px";
  b.style.background=`hsl(${Math.random()*360},80%,60%)`;

let angle = Math.random() * Math.PI * 2;
let radius = 50 + Math.random() * 40; // cât de mare e cercul
let centerX = Math.random() * (window.innerWidth - 200);
let centerY = Math.random() * (window.innerHeight - 200);

function move(){
  angle += 0.015; // viteza rotației (mai mic = mai lent)

let x = centerX + Math.cos(angle) * radius;
let y = centerY + Math.sin(angle) * radius;

  b.style.left = x + "px";
  b.style.top = y + "px";

  requestAnimationFrame(move);
}

move();

  // 🔥 AICI legăm poza de balon
  b.onclick=()=>{

    document.getElementById("balloonContainer").style.display="none";

    const photoView=document.getElementById("photoView");
    photoView.style.display="block";

    photoView.querySelector("img").src=balloonData[i].img;
    photoView.querySelector("p").innerText=balloonData[i].text;
  };

  container.appendChild(b);
}

}

function nextMusicSlide(){

  const image = document.getElementById("slideImage");
  const message = document.getElementById("slideMessage");

  // Fade out
  image.style.opacity = 0;

  setTimeout(()=>{

    musicIndex = (musicIndex + 1) % musicSlides.length;

    // Când imaginea este încărcată, o afișăm
    image.onload = () => {
      image.style.opacity = 1;
    };

    image.src = musicSlides[musicIndex].img;
    message.innerText = musicSlides[musicIndex].text;

  },500); // 🔥 mai mic decât înainte (nu 1s)
}

function playMusic(){

  const music = document.getElementById("bgMusic");

  music.play();

  clearInterval(musicInterval);
  musicInterval = setInterval(nextMusicSlide,7000);

  musicPlaying = true;
}

function pauseMusic(){

  const music = document.getElementById("bgMusic");

  music.pause();

  clearInterval(musicInterval);

  musicPlaying = false;
}

function stopMusic(){

  const music = document.getElementById("bgMusic");

  music.pause();
  music.currentTime = 0; // 🔥 revine la început

  clearInterval(musicInterval);

  musicIndex = 0;

  const image = document.getElementById("slideImage");
  const message = document.getElementById("slideMessage");

  image.src = musicSlides[0].img;
  message.innerText = musicSlides[0].text;

}

 let puzzle = [];
let emptyIndex = 8;
let puzzleSolved = false;
  const puzzleImages = [
  "dada.jpeg",
  "roma14.jpeg",
  "roma17.jpeg",
  "roma11.jpeg",
  "roma12.jpeg",
  "roma13.jpeg",
  "roma15.jpeg",
  "roma16.jpeg"
];

let currentPuzzleImage = puzzleImages[0];
  
function loadPuzzle(){

  const board = document.getElementById("puzzleBoard");
  board.innerHTML = "";

  const size = 3;

  puzzle = [];

  for(let i=0;i<9;i++){
    puzzle.push(i);
  }

  // amestecăm piesele
  puzzle.sort(()=>Math.random()-0.5);

  emptyIndex = puzzle.indexOf(8);

  drawPuzzle();

}
  function drawPuzzle(){

  const board = document.getElementById("puzzleBoard");
  board.innerHTML="";

  const size = 3;
const boardSize = board.clientWidth;
const pieceSize = boardSize / size;

  puzzle.forEach((value,index)=>{

    const piece = document.createElement("div");

    if(value === 8){
      piece.style.background="transparent";
    } else {

      piece.className="piece";

      piece.style.backgroundImage = "url('" + currentPuzzleImage + "')";

      piece.style.backgroundSize = boardSize + "px " + boardSize + "px";

const row = Math.floor(value / size);
const col = value % size;

piece.style.backgroundPosition =
`-${col * pieceSize}px -${row * pieceSize}px`;
    }

    piece.onclick = ()=>movePiece(index);

    board.appendChild(piece);

  });

}
function movePiece(index){

  const size = 3;

  const row = Math.floor(index/size);
  const col = index%size;

  const emptyRow = Math.floor(emptyIndex/size);
  const emptyCol = emptyIndex%size;

  const distance =
    Math.abs(row-emptyRow) +
    Math.abs(col-emptyCol);

  if(distance === 1 && !puzzleSolved){

    [puzzle[index],puzzle[emptyIndex]] =
    [puzzle[emptyIndex],puzzle[index]];

    emptyIndex = index;

    drawPuzzle();

    // 🔥 AICI pui codul de verificare
    if(checkPuzzleComplete() && !puzzleSolved){

      puzzleSolved = true;

      setTimeout(()=>{

        showPopup("🎉😘");

        const board = document.getElementById("puzzleBoard");
        board.innerHTML = `
          <div style="
            grid-column: span 3;
            text-align:center;
            font-size:22px;
            font-family:'Dancing Script', cursive;
            color:white;
            margin-top:20px;
          ">
            Felicitări! Ai rezolvat puzzle-ul! 💖
          </div>
        `;

      },300);

    }
  }
}
  function checkPuzzleComplete(){

  for(let i=0;i<puzzle.length;i++){
    if(puzzle[i] !== i){
      return false;
    }
  }

  return true;
}
function selectPiece(piece){

  if(!firstSelected){
    firstSelected = piece;
    piece.style.outline = "3px solid yellow";
  } else {

    // schimbăm între ele
    const temp = firstSelected.style.backgroundPosition;
    firstSelected.style.backgroundPosition = piece.style.backgroundPosition;
    piece.style.backgroundPosition = temp;

    firstSelected.style.outline = "";
    firstSelected = null;
  }
}

function loadPuzzleSelector(){

  const container = document.getElementById("puzzleSelector");
  container.innerHTML = "";

  puzzleImages.forEach(img =>{

    const image = document.createElement("img");
    image.src = img;
    image.style.width = "100%";
    image.style.marginBottom = "10px";
    image.style.borderRadius = "10px";
    image.style.cursor = "pointer";

   image.onclick = ()=>{

  currentPuzzleImage = img;

  loadPuzzle(); // regenerează puzzle-ul și îl amestecă

};

    container.appendChild(image);
  });

}
