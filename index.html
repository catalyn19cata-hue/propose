<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagină Specială</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap');

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(to bottom,#ff758f,#ff758f);
color:white;
text-align:center;
overflow-x:hidden;
  display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-top:25px;
text-align:center;
width:100%;
}
*{
box-sizing:border-box;
}
.top-photo{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
margin:15px auto;
display:block;
border:4px solid white;
box-shadow:0 0 30px rgba(255,255,255,0.6);
}

/* MENIU */

.menu-container{
width:95%;
max-width:700px;
margin:40px auto;
padding:40px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid rgba(255,255,255,0.4);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.menu{
display:flex;
flex-direction:column;
gap:18px;
}

button{
width:100%;
padding:18px;
font-size:18px;
border-radius:20px;
background:rgba(255,255,255,0.2);
border:1px solid rgba(255,255,255,0.4);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.3);
}

.section{
  display:none;
  width:100%;
  padding:20px;
}

.section.active{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* CHENAR */

.glass-box{
width:85%;
max-width:380px;
max-width:420px;
max-width:90%;
margin:20px auto;
display:block;
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid rgba(255,255,255,0.4);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* TIMER */

.timer-circle{
width:240px;
height:240px;
border-radius:50%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.2);
border:4px solid white;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
font-size:16px;
line-height:1.5;
}

/* QUIZ */

.quiz-question{
margin-bottom:30px;
}

/* LOVE */

.love-container{
  width:50px;
  height:400px;
  margin:20px auto;
  position:relative;
  background:rgba(255,255,255,0.2);
  border-radius:40px;
  border:2px solid white;
  cursor:pointer;
  touch-action: none;
}

.love-fill{
position:absolute;
bottom:0;
width:100%;
background:#ff2d55;
border-radius:40px;
height:0%;
transition:0.2s;
}

.love-message{
margin-top:15px;
font-size:20px;
min-height:30px;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
display:none;
}

/* INIMI */

.heart{
position:fixed;
bottom:-20px;
color:#ff2d55;
font-size:22px;
animation:rise linear forwards;
}

@keyframes rise{
to{
transform:translateY(-110vh);
opacity:0;
}
}

.back{
margin-top:20px;
width:200px;
}
.papyrus{
width:85%;
max-width:320px;
margin:20px auto;
padding:25px 20px;
min-height:auto;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(145deg,#fff6dc,#f2d9a8);
color:#4a2f12;
border-radius:25px;
border:2px solid rgba(120,80,30,0.3);
box-shadow:
0 20px 40px rgba(0,0,0,0.3),
inset 0 0 25px rgba(255,255,255,0.6);

font-family:'Dancing Script', cursive;
font-size:28px;
line-height:1.6;
text-align:center;
position:relative;
animation:fadeIn 0.6s ease;
}

/* colțuri decorative */
.papyrus:before,
.papyrus:after{
content:"❦";
position:absolute;
font-size:22px;
color:rgba(120,80,30,0.4);
}

.papyrus:before{
top:10px;
left:15px;
}

.papyrus:after{
bottom:10px;
right:15px;
}

.papyrus:before{
top:0;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.papyrus:after{
bottom:0;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.quiz-question{
  margin-bottom:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.quiz-question h3{
  margin:0;
}

.quiz-question .answers{
  display:flex;
  gap:10px;
  justify-content:center;
  width:100%;
}

.quiz-question .answers button{
  flex:1;
}

.timer-circle{
  position:relative;
}

/* inimă animată */
.timer-circle::before{
  content:"❤️";
  position:absolute;
  top:-15px;
  font-size:30px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.3); }
  100%{ transform:scale(1); }
}

.balloon{
  width:160px;
  height:200px;
  border-radius:50% 50% 45% 45%;
  opacity:0.9;
position:absolute;    /* 🔥 SCHIMBAT */
  cursor:pointer;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

#balloonContainer{
width:95%;
max-width:500px;
height:60vh;
position:relative;
overflow:hidden;
margin:20px auto;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:2px solid rgba(255,255,255,0.6);
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
@media (min-width:768px){
  .glass-box{
    max-width:800px;
  }
}
  #slideshow{
  width:95%;
  max-width:500px;
  margin:20px auto;
  text-align:center;
  position:relative;
}

#slideImage{
  width:100%;
  border-radius:20px;
  transition:opacity 1.5s ease;
  opacity:1;
}

#slideMessage{
  margin-top:10px;
  font-size:18px;
  font-family:'Dancing Script', cursive;
}

#musicBtn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:green;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Pagină Specială 💖</h1>

<img src="dada.jpeg" class="top-photo">

<div class="menu-container" id="menu">
<div class="menu">
<button onclick="showSection('time')">💞 Timpul nostru</button>
<button onclick="showSection('quiz')">🧠 Quiz</button>
<button onclick="showSection('love')">❤️ Cât de mult mă iubești?</button>
<button onclick="showSection('daily')">📅 Mesajul zilei</button>
<button onclick="showSection('balloons')">🎈 Capsula timpului</button>
<button onclick="showSection('music')">🎶 Muzica noastră</button>
</div>
</div>

<!-- TIMER -->
<div id="time" class="section">
<div class="glass-box">

<h2 style="margin-bottom:10px;">
  💞 Fiecare Moment
</h2>

<div class="papyrus" style="margin-bottom:20px; font-size:24px;">
  Nu măsor timpul… îl trăiesc cu tine ❤️
</div>

<div class="timer-circle" id="timer"></div>

</div>
<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
<div class="glass-box">
<div id="quizContainer"></div>
</div>
<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<!-- LOVE -->

<!-- DAILY MESSAGE -->
<div id="daily" class="section">
<div class="glass-box">
<h2>💌 Mesajul zilei</h2>
<div class="papyrus">
  <div id="dailyMessage"></div>
</div>
</div>
<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div id="love" class="section">
<div class="glass-box">
<h2>Cât de mult mă iubești? 💘</h2>

<div class="love-container" id="loveContainer">
<div class="love-fill" id="loveFill"></div>
</div>

<div class="love-message" id="loveMessage"></div>
</div>
<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<div class="popup" id="popup">😘</div>

<div id="balloons" class="section">

  <div id="music" class="section">

  <h2>🎶 Muzica noastră</h2>

  <div id="slideshow">
    <img id="slideImage" src="" />
    <div id="slideMessage"></div>
  </div>

  <button id="musicBtn" onclick="toggleMusic()">
    ⏸ Pauză / ▶ Pornește
  </button>

</div>
  <h2>🎉 Surpriză 🎉</h2>

  <div id="balloonContainer"></div>

  <div id="photoView" style="display:none; text-align:center;">
    <img src="dada.jpeg"
         style="max-width:100%; border-radius:20px; cursor:pointer;"
         onclick="backToBalloons()">
    <p style="font-family:'Dancing Script', cursive; font-size:20px; margin-top:15px;">
      Text elegant 💖
    </p>
  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

/* NAVIGARE */

function showSection(id){
  

  document.getElementById("menu").style.display="none";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  const section=document.getElementById(id);
  if(section){
    section.classList.add("active");
  }

 if(id==="quiz") loadQuiz();
if(id==="daily") showDailyMessage();
if(id==="balloons") createBalloons();
if(id==="music") startMusicSection();
}

function goBack(){

  document.getElementById("menu").style.display="block";

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });

  // repornim inimile când ieșim din capsulă
  heartsInterval = setInterval(createHeart,800);
}


/* POPUP */
function showPopup(emoji){

const popup=document.getElementById("popup");
popup.innerText=emoji;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},4000);

}

/* TIMER */
const startDate=new Date("2024-02-05T17:25:25");

setInterval(()=>{
const now=new Date();
let diff=now-startDate;

let sec=Math.floor(diff/1000)%60;
let min=Math.floor(diff/60000)%60;
let hrs=Math.floor(diff/3600000)%24;
let days=Math.floor(diff/86400000);

let years=Math.floor(days/365);
days%=365;
let months=Math.floor(days/30);
days%=30;

document.getElementById("timer").innerHTML=
years+" ani<br>"+
months+" luni<br>"+
days+" zile<br>"+
hrs+" ore<br>"+
min+" minute<br>"+
sec+" secunde";
},1000);

/* INIMI */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerText="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
let heartsInterval = setInterval(createHeart,800);

/* QUIZ */
const questions=[

{q:"Întrebarea 1?",a:["vasile","ion","C"],c:0},
{q:"Întrebarea 2?",a:["A","B","C"],c:1},
{q:"Întrebarea 3?",a:["A","B","C"],c:2},
{q:"Întrebarea 4?",a:["A","B","C"],c:0},
{q:"Întrebarea 5?",a:["A","B","C"],c:1},
{q:"Întrebarea 6?",a:["A","B","C"],c:2},
{q:"Întrebarea 7?",a:["A","B","C"],c:0},
{q:"Întrebarea 8?",a:["A","B","C"],c:1},
{q:"Întrebarea 9?",a:["A","B","C"],c:2},
{q:"Întrebarea 10?",a:["A","B","C"],c:0},
{q:"Întrebarea 11?",a:["A","B","C"],c:1},
{q:"Întrebarea 12?",a:["A","B","C"],c:2},
{q:"Întrebarea 13?",a:["A","B","C"],c:0},
{q:"Întrebarea 14?",a:["A","B","C"],c:1},
{q:"Întrebarea 15?",a:["A","B","C"],c:2}

];
let quizOrder = [];
let quizIndex = 0;
function loadQuiz(){

  const container=document.getElementById("quizContainer");
  container.innerHTML="";

  // dacă nu avem ordine sau am terminat tot
  if(quizOrder.length === 0 || quizIndex >= quizOrder.length){
    quizOrder = [...questions].sort(()=>Math.random()-0.5);
    quizIndex = 0;
  }

  // luăm următoarele 7
  let selected = quizOrder.slice(quizIndex, quizIndex+7);

  selected.forEach(q=>{

    let div=document.createElement("div");
    div.className="quiz-question";
    div.innerHTML="<h3>"+q.q+"</h3>";

    let answersDiv=document.createElement("div");
    answersDiv.className="answers";

    q.a.forEach((ans,i)=>{

      let btn=document.createElement("button");
      btn.innerText=ans;

      btn.onclick=()=>{

        Array.from(answersDiv.querySelectorAll("button"))
          .forEach(b=>b.style.background="");

        btn.style.background="#ffffff55";

        if(i===q.c){
          showPopup("😘");
          btn.style.background="green";
        }else{
          showPopup("😢");
          btn.style.background="red";
        }

      };

      answersDiv.appendChild(btn);

    });

    div.appendChild(answersDiv);
    container.appendChild(div);

  });

  quizIndex += 7;

  // buton următoarele 7
  let nextBtn=document.createElement("button");
  nextBtn.innerText="👉 Următoarele 7";
  nextBtn.style.marginTop="20px";
  nextBtn.onclick=loadQuiz;

  container.appendChild(nextBtn);
}

/* LOVE */
function setLove(e){

const rect=e.currentTarget.getBoundingClientRect();
let percent=100-(e.clientY-rect.top)/rect.height*100;
percent=Math.round(percent/10)*10;

if(percent<0) percent=0;
if(percent>100) percent=100;

document.getElementById("loveFill").style.height=percent+"%";

const message=document.getElementById("loveMessage");

const messages={
0:"😢 Serios?",
10:"🙂 Începem timid!",
20:"😄 Crește!",
30:"😊 Aproape!",
40:"💞 Simt ceva!",
50:"🔥 Jumătate!",
60:"😍 Devine serios!",
70:"💘 Aproape!",
80:"🥰 Foarte aproape!",
90:"💖 WOW!",
100:"😘 MAXIM!"
};

message.innerText=messages[percent]||"";

if(percent===100){
showPopup("😘");
document.getElementById("loveMessage").innerText =
"Atât de mult te iubesc și eu 💖";
}
if(percent===0) showPopup("😢");

}

/* ===== MESAJUL ZILEI ===== */


const dailyMessages = [
  "Mesaj 1 ❤️",
  "Mesaj 2 ❤️",
  "Mesaj 3 ❤️"
  // ...
  // continui până la 365
];

function getDayOfYear(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  return Math.floor(diff / 86400000);
}

function showDailyMessage(){
  const day = getDayOfYear() % dailyMessages.length;
  document.getElementById("dailyMessage").innerText =
    dailyMessages[day];
}
setInterval(() => {
  showDailyMessage();
}, 60000);


const balloonData = [
  {img:"dada.jpeg", text:"Momentul 1 💖"},
  {img:"dada.jpeg", text:"Momentul 2 ✨"},
  {img:"dada.jpeg", text:"Momentul 3 🥰"},
  {img:"dada.jpeg", text:"Momentul 4 💕"},
  {img:"dada.jpeg", text:"Momentul 5 💞"},
  {img:"dada.jpeg", text:"Momentul 6 💗"},
  {img:"dada.jpeg", text:"Momentul 7 💝"},
  {img:"dada.jpeg", text:"Momentul 8 🌸"},
  {img:"dada.jpeg", text:"Momentul 9 💘"},
  {img:"dada.jpeg", text:"Momentul 10 💞"},
  {img:"dada.jpeg", text:"Momentul 11 💖"},
  {img:"dada.jpeg", text:"Momentul 12 ✨"},
  {img:"dada.jpeg", text:"Momentul 13 🥰"},
  {img:"dada.jpeg", text:"Momentul 14 💕"},
  {img:"dada.jpeg", text:"Momentul 15 💗"},
  {img:"dada.jpeg", text:"Momentul 16 💝"},
  {img:"dada.jpeg", text:"Momentul 17 🌷"},
  {img:"dada.jpeg", text:"Momentul 18 💘"},
  {img:"dada.jpeg", text:"Momentul 19 💞"},
  {img:"dada.jpeg", text:"Momentul 20 💖"}
];

function createBalloons(){

  const container=document.getElementById("balloonContainer");
  container.innerHTML="";
  container.style.display="block";

  document.getElementById("photoView").style.display="none";

  // 🔽 AICI vine codul nou

for(let i=0;i<balloonData.length;i++){

  const b=document.createElement("div");
  b.className="balloon";

  b.style.width="80px";
  b.style.height="110px";
  b.style.background=`hsl(${Math.random()*360},80%,60%)`;

let angle = Math.random() * Math.PI * 2;
let radius = 50 + Math.random() * 40; // cât de mare e cercul
let centerX = Math.random() * (window.innerWidth - 200);
let centerY = Math.random() * (window.innerHeight - 200);

function move(){
  angle += 0.015; // viteza rotației (mai mic = mai lent)

  x = centerX + Math.cos(angle) * radius;
  y = centerY + Math.sin(angle) * radius;

  b.style.left = x + "px";
  b.style.top = y + "px";

  requestAnimationFrame(move);
}

move();

  // 🔥 AICI legăm poza de balon
  b.onclick=()=>{

    document.getElementById("balloonContainer").style.display="none";

    const photoView=document.getElementById("photoView");
    photoView.style.display="block";

    photoView.querySelector("img").src=balloonData[i].img;
    photoView.querySelector("p").innerText=balloonData[i].text;
  };

  container.appendChild(b);
}

}

function backToBalloons(){
  document.getElementById("photoView").style.display="none";
  document.getElementById("balloonContainer").style.display="block";
}
const loveContainer = document.getElementById("loveContainer");

let isDragging = false;

loveContainer.addEventListener("touchstart", e=>{
  isDragging = true;
  updateLove(e.touches[0]);
});

loveContainer.addEventListener("touchmove", e=>{
  if(isDragging){
    updateLove(e.touches[0]);
  }
});

loveContainer.addEventListener("touchend", ()=>{
  isDragging = false;
});

function updateLove(touch){

  const rect = loveContainer.getBoundingClientRect();

  let percent = 100 - ((touch.clientY - rect.top) / rect.height) * 100;

  percent = Math.round(percent / 10) * 10;

  if(percent < 0) percent = 0;
  if(percent > 100) percent = 100;

  document.getElementById("loveFill").style.height = percent + "%";

  const message=document.getElementById("loveMessage");

  const messages={
    0:"😢 Serios?",
    10:"🙂 Începem timid!",
    20:"😄 Crește!",
    30:"😊 Aproape!",
    40:"💞 Simt ceva!",
    50:"🔥 Jumătate!",
    60:"😍 Devine serios!",
    70:"💘 Aproape!",
    80:"🥰 Foarte aproape!",
    90:"💖 WOW!",
    100:"😘 MAXIM!"
  };

  message.innerText = messages[percent] || "";

  if(percent === 100){
    showPopup("😘");
    message.innerText = "Atât de mult te iubesc și eu 💖";
  }

}
  const musicSlides = [
  {img:"img1.jpg", text:"Mesaj pentru poza 1 💖"},
  {img:"img2.jpg", text:"Mesaj pentru poza 2 ✨"},
  {img:"img3.jpg", text:"Mesaj pentru poza 3 🥰"}
  // ➜ poți adăuga oricâte vrei aici
];

let musicIndex = 0;
let musicInterval = null;
let musicPlaying = true;

function startMusicSection(){

  const image = document.getElementById("slideImage");
  const message = document.getElementById("slideMessage");
  const music = document.getElementById("bgMusic");

  image.src = musicSlides[0].img;
  message.innerText = musicSlides[0].text;

  music.play();

  musicInterval = setInterval(nextMusicSlide,7000);

}

function nextMusicSlide(){

  const image = document.getElementById("slideImage");
  const message = document.getElementById("slideMessage");

  image.style.opacity = 0;

  setTimeout(()=>{

    musicIndex = (musicIndex + 1) % musicSlides.length;

    image.src = musicSlides[musicIndex].img;
    message.innerText = musicSlides[musicIndex].text;

    image.style.opacity = 1;

  },1000);
}

function toggleMusic(){

  const music = document.getElementById("bgMusic");

  if(musicPlaying){
    music.pause();
    clearInterval(musicInterval);
    musicPlaying = false;
  } else {
    music.play();
    musicInterval = setInterval(nextMusicSlide,7000);
    musicPlaying = true;
  }

}

/* NOTE MUZICALE DOAR ÎN ACEASTĂ SECȚIUNE */

function createMusicNote(){

  if(!document.getElementById("music").classList.contains("active"))
    return;

  const note=document.createElement("div");
  note.innerText="🎵";
  note.style.position="fixed";
  note.style.left=Math.random()*100+"vw";
  note.style.bottom="0";
  note.style.fontSize="22px";
  note.style.animation="rise 5s linear forwards";

  document.body.appendChild(note);

  setTimeout(()=>note.remove(),5000);
}

setInterval(createMusicNote,800);
</script>
<audio id="bgMusic" src="ordinary.mp3" loop></audio>
</body>
</html>
